<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QRコード - かんじインベーダー</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 20px;
    background: #0a0a1a;
    font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; color: #fff;
  }
  h1 { font-size: 22px; color: #00cfff; text-shadow: 0 0 10px #00cfff; margin-bottom: 6px; }
  .subtitle { font-size: 14px; color: #888; margin-bottom: 24px; }
  .card {
    background: #fff; border-radius: 20px;
    padding: 24px; text-align: center;
    box-shadow: 0 0 30px rgba(0,207,255,0.3);
    width: 100%; max-width: 320px;
  }
  .card h2 { font-size: 16px; color: #111; margin-bottom: 8px; }
  #qrcode { display: inline-block; margin: 12px 0; }
  .url {
    font-size: 13px; color: #555; word-break: break-all;
    background: #f5f5f5; padding: 10px; border-radius: 8px;
    margin-top: 10px;
  }
  .note {
    margin-top: 20px; font-size: 13px; color: #aaa;
    line-height: 1.8; text-align: center;
  }
  .note b { color: #00cfff; }
  .play-btn {
    display: inline-block; margin-top: 24px;
    background: #1a237e; color: #fff;
    padding: 14px 32px; border-radius: 12px;
    font-size: 16px; font-weight: 900;
    text-decoration: none;
    box-shadow: 0 0 15px rgba(0,207,255,0.4);
  }
  .play-btn:hover { background: #283593; }
</style>
</head>
<body>
<h1>📱 かんじインベーダー</h1>
<p class="subtitle">スマホでQRコードを読み取ってください</p>

<div class="card">
  <h2>🎮 ゲームを開く</h2>
  <div id="qrcode"></div>
  <div class="url" id="url-text"></div>
</div>

<p class="note">
  ① <b>PCとスマホを同じWiFiに接続</b><br>
  ② カメラアプリでQRコードを読み取る<br>
  ③ ブラウザでゲームが開きます
</p>

<a class="play-btn" href="invader.html">▶ PCでプレイ</a>

<script>
  const ip = location.hostname;
  const port = location.port ? ':' + location.port : '';
  const url = 'http://' + ip + port + '/invader.html';

  document.getElementById('url-text').textContent = url;

  new QRCode(document.getElementById('qrcode'), {
    text: url,
    width: 220,
    height: 220,
    colorDark: '#000000',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });
</script>
</body>
</html>
